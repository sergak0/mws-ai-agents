<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#EEF6F1"/>
    </linearGradient>
    <linearGradient id="hero" x1="1020" y1="40" x2="1450" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D9F99D" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#BFDBFE" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="shadow" x="-40" y="-40" width="220" height="220" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <filter id="cardShadow" x="-40" y="-40" width="420" height="260" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M0 0L14 7L0 14V0Z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 44px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #0F172A; }
      .subtitle { font: 500 19px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #475569; }
      .section { font: 700 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; letter-spacing: 0.12em; text-transform: uppercase; fill: #0F172A; }
      .cardTitle { font: 700 22px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #0F172A; }
      .cardText { font: 500 16px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #475569; }
      .badge { font: 700 22px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: white; }
      .panelTitle { font: 700 22px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #0F172A; }
      .panelText { font: 500 16px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #334155; }
      .foot { font: 600 16px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #0F172A; }
      .small { font: 600 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #64748B; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <circle cx="1320" cy="180" r="220" fill="url(#hero)"/>
  <circle cx="1480" cy="780" r="180" fill="#DBEAFE" fill-opacity="0.45"/>
  <circle cx="150" cy="870" r="140" fill="#DCFCE7" fill-opacity="0.5"/>

  <text x="84" y="88" class="section">Client Overview</text>
  <text x="84" y="142" class="title">Kaggle Multi-Agent System</text>
  <text x="84" y="178" class="subtitle">A tool-driven agent loop: the agents plan and improve the experiment, while the executor runs a safe, reproducible ML pipeline.</text>

  <g filter="url(#shadow)">
    <circle cx="122" cy="330" r="34" fill="#0EA5E9"/>
  </g>
  <text x="112" y="339" class="badge">1</text>
  <rect x="176" y="262" width="268" height="136" rx="28" fill="white" filter="url(#cardShadow)"/>
  <text x="208" y="314" class="cardTitle">Kaggle Data</text>
  <text x="208" y="344" class="cardText">competition bundle,</text>
  <text x="208" y="368" class="cardText">task description, local storage</text>

  <g filter="url(#shadow)">
    <circle cx="522" cy="330" r="34" fill="#14B8A6"/>
  </g>
  <text x="512" y="339" class="badge">2</text>
  <rect x="576" y="238" width="308" height="184" rx="28" fill="white" filter="url(#cardShadow)"/>
  <text x="608" y="290" class="cardTitle">ResearchAgent + Local RAG</text>
  <text x="608" y="320" class="cardText">retrieves relevant notes,</text>
  <text x="608" y="344" class="cardText">sanitizes untrusted text,</text>
  <text x="608" y="368" class="cardText">builds a structured research brief</text>

  <g filter="url(#shadow)">
    <circle cx="982" cy="330" r="34" fill="#F59E0B"/>
  </g>
  <text x="972" y="339" class="badge">3</text>
  <rect x="1036" y="238" width="268" height="184" rx="28" fill="white" filter="url(#cardShadow)"/>
  <text x="1068" y="290" class="cardTitle">ModelerAgent</text>
  <text x="1068" y="320" class="cardText">chooses the next</text>
  <text x="1068" y="344" class="cardText">ToolPlan:</text>
  <text x="1068" y="368" class="cardText">features, model preset, ensemble</text>

  <g filter="url(#shadow)">
    <circle cx="122" cy="618" r="34" fill="#6366F1"/>
  </g>
  <text x="112" y="627" class="badge">4</text>
  <rect x="176" y="526" width="356" height="184" rx="28" fill="white" filter="url(#cardShadow)"/>
  <text x="208" y="578" class="cardTitle">Validated Executor</text>
  <text x="208" y="608" class="cardText">tool validation -&gt; ExperimentSpec</text>
  <text x="208" y="632" class="cardText">features.py + modeling.py</text>
  <text x="208" y="656" class="cardText">train, evaluate, write submission</text>

  <g filter="url(#shadow)">
    <circle cx="662" cy="618" r="34" fill="#EC4899"/>
  </g>
  <text x="652" y="627" class="badge">5</text>
  <rect x="716" y="526" width="372" height="184" rx="28" fill="white" filter="url(#cardShadow)"/>
  <text x="748" y="578" class="cardTitle">CriticAgent + Feedback Loop</text>
  <text x="748" y="608" class="cardText">reads metrics, compares best-so-far,</text>
  <text x="748" y="632" class="cardText">decides retry / stop,</text>
  <text x="748" y="656" class="cardText">drives the next iteration</text>

  <rect x="1172" y="526" width="344" height="184" rx="28" fill="#0F172A"/>
  <text x="1204" y="578" class="panelTitle" fill="white">Best Output</text>
  <text x="1204" y="608" class="panelText" fill="#CBD5E1">submission.csv</text>
  <text x="1204" y="632" class="panelText" fill="#CBD5E1">run report</text>
  <text x="1204" y="656" class="panelText" fill="#CBD5E1">iteration trace</text>

  <rect x="1172" y="238" width="344" height="220" rx="28" fill="#FFFFFF" filter="url(#cardShadow)"/>
  <text x="1204" y="290" class="panelTitle">Safety Rails</text>
  <text x="1204" y="324" class="panelText">- sanitize retrieved text</text>
  <text x="1204" y="350" class="panelText">- validate tool names and args</text>
  <text x="1204" y="376" class="panelText">- bounded iteration budget</text>
  <text x="1204" y="402" class="panelText">- typed contracts via Pydantic</text>

  <rect x="84" y="794" width="1432" height="106" rx="30" fill="#FFFFFF" filter="url(#cardShadow)"/>
  <text x="124" y="846" class="foot">Autonomy boundary:</text>
  <text x="314" y="846" class="foot">agents choose validated tools and improve the experiment loop; the ML executor stays deterministic and reproducible.</text>

  <line x1="444" y1="330" x2="576" y2="330" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="884" y1="330" x2="1036" y2="330" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1170 422C1040 470 950 504 888 530" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1036 618H1172" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M532 618H716" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1172 618H1100" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M846 526C860 466 938 422 1080 422" stroke="#EC4899" stroke-width="5" stroke-dasharray="14 10" fill="none"/>
  <path d="M846 526C740 436 686 430 576 422" stroke="#0EA5E9" stroke-width="5" stroke-dasharray="14 10" fill="none" marker-end="url(#arrow)"/>

  <text x="898" y="476" class="small">retry with feedback</text>
  <text x="1204" y="432" class="small">prompt-injection aware context handling</text>
</svg>
